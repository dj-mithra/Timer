<!DOCTYPE html>
<html>
<head>
  <title>Blue Timer</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">
    <h1>Timer!</h1>

    <label>Minutes:</label>
    <input type="number" id="minutesInput" placeholder="MM">

    <label>Seconds:</label>
    <input type="number" id="secondsInput" placeholder="SS">

    <br><br>

    <button onclick="startTimer()">Start</button>
    <button onclick="pauseTimer()">Pause</button>
    <button onclick="resetTimer()">Reset</button>

    <h2 id="display">00:00</h2>
  </div>

  <script src="script.js"></script>

</body>
</html>
